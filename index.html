<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>旅行行李规划</title>
    <style>
:root {
  color-scheme: light;
  --paper: #f4f5f7;
  --surface: #ffffff;
  --surface-soft: #f8f8f6;
  --surface-tint: #f0f2f5;
  --ink: #111111;
  --muted: #7a7d83;
  --line: #e8eaee;
  --line-strong: #d8dbe2;
  --pink: #ff4f8b;
  --lime: #d7ff5f;
  --sky: #a8e8ff;
  --lilac: #efd8ff;
  --peach: #ffd7c2;
  --green: #c9f36b;
  --shadow: 0 18px 48px rgba(17, 17, 17, 0.07);
}

* {
  box-sizing: border-box;
}

body {
  margin: 0;
  min-height: 100vh;
  background: var(--paper);
  color: var(--ink);
  font-family:
    Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI",
    "PingFang SC", "Microsoft YaHei", sans-serif;
}

button,
input,
select,
textarea {
  font: inherit;
}

button {
  border: 0;
  cursor: pointer;
}

.app-shell {
  width: min(1420px, calc(100vw - 36px));
  margin: 0 auto;
  padding: 28px 0 38px;
}

.trip-panel,
.class-panel,
.planner-panel,
.packing-panel {
  background: rgba(255, 255, 255, 0.94);
  border: 1px solid rgba(232, 234, 238, 0.92);
  box-shadow: var(--shadow);
}

.trip-panel {
  border-radius: 8px;
  overflow: hidden;
  padding: 24px;
  position: relative;
}

.trip-panel::before {
  background: linear-gradient(90deg, var(--lime), var(--sky), var(--lilac), var(--pink));
  content: "";
  display: block;
  height: 5px;
  inset: 0 0 auto;
  position: absolute;
}

.brand-row,
.section-heading,
.summary-strip,
.workspace-grid,
.trip-grid,
.trip-tabs,
.split,
.manual-add {
  display: flex;
}

.brand-row,
.section-heading {
  align-items: flex-start;
  justify-content: space-between;
  gap: 16px;
}

.section-heading {
  align-items: flex-end;
}

.eyebrow {
  align-items: center;
  color: var(--muted);
  display: flex;
  gap: 7px;
  letter-spacing: 0;
  margin: 0 0 8px;
  font-size: 11px;
  font-weight: 850;
  text-transform: uppercase;
}

.eyebrow::before {
  background: var(--pink);
  border-radius: 50%;
  content: "";
  height: 8px;
  width: 8px;
}

h1,
h2 {
  letter-spacing: 0;
  margin: 0;
}

h1 {
  font-size: clamp(34px, 4.4vw, 58px);
  line-height: 0.98;
}

h2 {
  font-size: 22px;
  line-height: 1.08;
}

.trip-tabs {
  align-items: flex-end;
  gap: 7px;
  margin-top: 26px;
  overflow-x: auto;
  padding-bottom: 0;
}

.trip-tabs::-webkit-scrollbar {
  height: 0;
}

.trip-tab {
  background: var(--surface-tint);
  border: 1px solid var(--line);
  border-bottom-color: var(--line-strong);
  border-radius: 8px 8px 0 0;
  color: var(--ink);
  display: grid;
  gap: 4px;
  min-height: 62px;
  min-width: 170px;
  padding: 12px 15px 11px;
  position: relative;
  text-align: left;
  white-space: nowrap;
}

.trip-tab::before {
  background: var(--sky);
  border-radius: 50%;
  content: "";
  height: 7px;
  position: absolute;
  right: 12px;
  top: 12px;
  width: 7px;
}

.trip-tab:nth-child(2n)::before {
  background: var(--lime);
}

.trip-tab:nth-child(3n)::before {
  background: var(--pink);
}

.trip-tab:hover,
.trip-tab.is-active {
  background: var(--surface);
  border-color: var(--ink);
  border-bottom-color: var(--surface);
}

.trip-tab.is-active {
  transform: translateY(1px);
}

.trip-tab strong {
  font-size: 15px;
  line-height: 1.18;
}

.trip-tab span {
  color: var(--muted);
  font-size: 12px;
  line-height: 1.2;
}

.trip-tab.add-trip {
  align-content: center;
  background: var(--ink);
  border-color: var(--ink);
  color: #fff;
  font-weight: 850;
  min-width: 118px;
}

.trip-tab.add-trip::before {
  display: none;
}

.trip-grid {
  border-top: 1px solid var(--line);
  display: grid;
  gap: 14px;
  grid-template-columns: repeat(2, minmax(0, 1fr));
  margin-top: 0;
  padding-top: 18px;
}

label {
  color: var(--muted);
  display: grid;
  font-size: 12px;
  font-weight: 780;
  gap: 7px;
}

input,
select,
textarea {
  background: var(--surface-soft);
  border: 1px solid var(--line);
  border-radius: 8px;
  color: var(--ink);
  outline: 0;
  padding: 12px 13px;
  transition:
    border-color 160ms ease,
    box-shadow 160ms ease,
    background 160ms ease,
    transform 160ms ease;
  width: 100%;
}

input:focus,
select:focus,
textarea:focus {
  background: #fff;
  border-color: var(--ink);
  box-shadow: 0 0 0 4px rgba(255, 79, 139, 0.13);
}

.summary-strip {
  gap: 10px;
  margin-top: 14px;
}

.summary-strip div {
  background: var(--surface-soft);
  border: 1px solid var(--line);
  border-radius: 8px;
  min-width: 132px;
  padding: 13px 15px;
}

.summary-strip div:first-child {
  background: var(--lime);
}

.summary-strip div:nth-child(2) {
  background: var(--sky);
}

.summary-strip strong,
.summary-strip span {
  display: block;
}

.summary-strip strong {
  font-size: 28px;
  line-height: 1;
}

.summary-strip span {
  color: rgba(17, 17, 17, 0.68);
  font-size: 12px;
  margin-top: 5px;
}

.workspace-grid {
  align-items: stretch;
  display: grid;
  gap: 16px;
  grid-template-columns: 310px minmax(430px, 1fr) 360px;
  margin-top: 16px;
}

.class-panel,
.planner-panel,
.packing-panel {
  border-radius: 8px;
  min-height: 650px;
  padding: 20px;
}

.section-heading button,
.manual-add button {
  background: var(--ink);
  border-radius: 8px;
  color: #fff;
  font-weight: 850;
  height: 42px;
  line-height: 1;
  min-width: 74px;
  padding: 0 15px;
  white-space: nowrap;
}

.quiet-button {
  background: var(--surface) !important;
  border: 1px solid var(--line-strong) !important;
  color: var(--ink) !important;
}

.quiet-button:hover,
.section-heading button:hover,
.manual-add button:hover {
  transform: translateY(-1px);
}

.class-list {
  display: grid;
  gap: 10px;
  margin-top: 18px;
}

.class-card {
  background: var(--surface-soft);
  border: 1px solid var(--line);
  border-radius: 8px;
  color: var(--ink);
  display: grid;
  gap: 7px;
  min-height: 118px;
  padding: 15px;
  position: relative;
  text-align: left;
  transition:
    border-color 160ms ease,
    transform 160ms ease,
    background 160ms ease,
    box-shadow 160ms ease;
  width: 100%;
}

.class-card::after {
  background: var(--lilac);
  border-radius: 50%;
  content: "";
  height: 8px;
  position: absolute;
  right: 14px;
  top: 14px;
  width: 8px;
}

.class-card:nth-child(2n)::after {
  background: var(--peach);
}

.class-card:nth-child(3n)::after {
  background: var(--green);
}

.class-card:hover,
.class-card.is-active {
  background: #fff;
  border-color: var(--ink);
  box-shadow: 0 12px 28px rgba(17, 17, 17, 0.06);
  transform: translateY(-1px);
}

.class-date,
.class-time,
.class-teacher {
  color: var(--muted);
  font-size: 12px;
  line-height: 1.35;
}

.class-name {
  font-size: 18px;
  line-height: 1.24;
  padding-right: 20px;
}

.planner-form {
  display: grid;
  gap: 26px;
  margin-top: 18px;
}

.form-section {
  display: grid;
  gap: 15px;
}

.form-section h3 {
  font-size: 20px;
  letter-spacing: 0;
  margin: 0;
}

.inline-heading {
  align-items: center;
  display: flex;
  gap: 12px;
  justify-content: space-between;
  flex-wrap: wrap;
}

.add-field-chip {
  align-items: center;
  background: var(--ink);
  border: 1px solid var(--ink);
  border-radius: 8px;
  color: #fff;
  display: inline-flex;
  font-size: 15px;
  font-weight: 850;
  height: 38px;
  justify-content: center;
  line-height: 1;
  min-width: 64px;
  padding: 0 13px;
  white-space: nowrap;
}

.add-field-chip:hover {
  transform: translateY(-1px);
}

.split {
  gap: 14px;
}

.split > label {
  flex: 1;
}

.outfit-list {
  background: var(--surface-soft);
  border: 1px solid var(--line);
  border-radius: 8px;
  display: grid;
  gap: 0;
  overflow: hidden;
}

.outfit-field {
  align-items: center;
  border-bottom: 1px solid var(--line);
  display: grid;
  gap: 14px;
  grid-template-columns: 112px minmax(0, 1fr);
  padding: 11px 12px;
}

.outfit-field:last-child {
  border-bottom: 0;
}

.outfit-field-label {
  align-items: center;
  color: var(--muted);
  display: flex;
  font-size: 12px;
  font-weight: 800;
  gap: 6px;
  min-width: 0;
}

.outfit-field-name {
  border-radius: 6px;
  overflow: hidden;
  padding: 7px 0;
  text-overflow: ellipsis;
  white-space: nowrap;
}

.outfit-field.is-custom .outfit-field-name {
  cursor: text;
}

.outfit-field.is-custom .outfit-field-name:hover {
  color: var(--ink);
}

.outfit-field-name-input {
  background: transparent;
  border-color: transparent;
  color: var(--muted);
  font-size: 12px;
  font-weight: 800;
  min-height: 38px;
  padding: 7px 8px;
}

.outfit-field-name-input:focus {
  background: #fff;
  border-color: var(--ink);
}

.remove-field-button {
  align-items: center;
  background: transparent;
  color: var(--muted);
  display: none;
  font-size: 18px;
  height: 22px;
  justify-content: center;
  line-height: 1;
  padding: 0;
  width: 22px;
}

.outfit-field.is-custom .remove-field-button {
  display: inline-flex;
}

.remove-field-button:hover {
  color: var(--pink);
}

.outfit-field input {
  background: #fff;
  border-color: transparent;
}

.outfit-field input:focus {
  border-color: var(--ink);
}

.packing-list {
  display: grid;
  gap: 14px;
  margin: 20px 0;
}

.packing-group {
  background: var(--surface-soft);
  border: 1px solid var(--line);
  border-radius: 8px;
  display: grid;
  gap: 8px;
  padding: 12px;
}

.packing-group h3 {
  align-items: center;
  color: var(--ink);
  display: flex;
  font-size: 12px;
  font-weight: 850;
  gap: 8px;
  letter-spacing: 0;
  margin: 0 0 2px;
  text-transform: uppercase;
}

.packing-group h3::before {
  background: var(--pink);
  border-radius: 50%;
  content: "";
  height: 8px;
  width: 8px;
}

.packing-group:nth-child(2n) h3::before {
  background: var(--lime);
}

.packing-group:nth-child(3n) h3::before {
  background: var(--sky);
}

.packing-item {
  align-items: center;
  background: #fff;
  border: 1px solid transparent;
  border-radius: 8px;
  color: var(--ink);
  display: grid;
  font-size: 14px;
  font-weight: 720;
  gap: 10px;
  grid-template-columns: 1fr auto;
  min-height: 42px;
  padding: 9px 10px;
}

.item-count {
  background: var(--ink);
  border-radius: 6px;
  color: #fff;
  font-size: 11px;
  padding: 4px 7px;
}

.item-count:empty {
  display: none;
}

.manual-add {
  gap: 8px;
}

.manual-add input {
  min-width: 0;
}

.empty-state {
  background: var(--surface-soft);
  border: 1px dashed var(--line-strong);
  border-radius: 8px;
  color: var(--muted);
  line-height: 1.6;
  padding: 16px;
}

.toast {
  background: var(--ink);
  border-radius: 8px;
  bottom: 22px;
  box-shadow: var(--shadow);
  color: #fff;
  padding: 12px 14px;
  position: fixed;
  right: 22px;
}

@media (max-width: 1180px) {
  .workspace-grid {
    grid-template-columns: 290px 1fr;
  }

  .packing-panel {
    grid-column: 1 / -1;
    min-height: auto;
  }
}

@media (max-width: 820px) {
  .app-shell {
    padding-top: 10px;
    width: min(100vw - 20px, 720px);
  }

  .trip-grid,
  .workspace-grid,
  .outfit-list {
    grid-template-columns: 1fr;
  }

  .outfit-field {
    grid-template-columns: 1fr;
  }

  .split {
    display: grid;
  }

  .class-panel,
  .planner-panel,
  .packing-panel {
    min-height: auto;
  }

  .summary-strip {
    display: grid;
    grid-template-columns: repeat(2, minmax(0, 1fr));
  }

  .summary-strip div {
    min-width: 0;
  }
}

@media (max-width: 520px) {
  .app-shell {
    width: min(100vw - 14px, 420px);
  }

  .trip-panel,
  .class-panel,
  .planner-panel,
  .packing-panel {
    padding: 15px;
  }

  .brand-row {
    align-items: stretch;
  }

  .section-heading {
    align-items: flex-end;
  }

  .summary-strip {
    grid-template-columns: 1fr;
  }

  h1 {
    font-size: 36px;
  }

  .trip-tab {
    min-width: 150px;
  }
}

    </style>
  </head>
  <body>
    <main class="app-shell">
      <section class="trip-panel" aria-label="旅行概览">
        <div class="brand-row">
          <div>
            <p class="eyebrow">Travel Packing Planner</p>
            <h1>旅行行李规划</h1>
          </div>
        </div>

        <div class="trip-tabs" id="tripTabs" aria-label="旅行页签"></div>

        <div class="trip-grid">
          <label>
            城市
            <input id="tripCity" type="text" autocomplete="off" />
          </label>
          <label>
            日期
            <input id="tripDates" type="text" autocomplete="off" />
          </label>
        </div>

        <div class="summary-strip" aria-label="汇总">
          <div>
            <strong id="classCount">0</strong>
            <span>节舞课</span>
          </div>
          <div>
            <strong id="packingCount">0</strong>
            <span>件需打包</span>
          </div>
        </div>
      </section>

      <section class="workspace-grid">
        <aside class="class-panel" aria-label="舞课列表">
          <div class="section-heading">
            <div>
              <p class="eyebrow">Schedule</p>
              <h2>舞蹈课</h2>
            </div>
            <button id="addClassButton" type="button">新增</button>
          </div>
          <div class="class-list" id="classList"></div>
        </aside>

        <section class="planner-panel" aria-label="穿搭规划">
          <div class="section-heading">
            <div>
              <p class="eyebrow">Fit Plan</p>
              <h2 id="activeTitle"></h2>
            </div>
            <button id="deleteClassButton" class="quiet-button" type="button">删除课程</button>
          </div>

          <form id="classForm" class="planner-form">
            <section class="form-section">
              <div class="form-row split">
                <label>
                  日期
                  <input name="date" type="text" autocomplete="off" />
                </label>
                <label>
                  时间
                  <input name="time" type="text" autocomplete="off" />
                </label>
              </div>

              <div class="form-row split">
                <label>
                  舞蹈课
                  <input name="className" type="text" autocomplete="off" />
                </label>
                <label>
                  老师
                  <input name="teacher" type="text" autocomplete="off" />
                </label>
              </div>
            </section>

            <section class="form-section">
              <div class="inline-heading">
                <h3>Outfit</h3>
                <button id="addCustomFieldButton" class="add-field-chip" type="button">新增</button>
              </div>
              <div class="outfit-list" id="outfitList"></div>
            </section>
          </form>
        </section>

        <aside class="packing-panel" aria-label="行李清单">
          <div class="section-heading">
            <div>
              <p class="eyebrow">Packing</p>
              <h2>行李清单</h2>
            </div>
          </div>
          <div class="packing-list" id="packingList"></div>
          <div class="manual-add">
            <input id="manualItemInput" type="text" autocomplete="off" />
            <button id="addManualItemButton" type="button">加入</button>
          </div>
        </aside>
      </section>
    </main>

    <template id="classCardTemplate">
      <button class="class-card" type="button">
        <strong class="class-name"></strong>
        <span class="class-date"></span>
        <span class="class-time"></span>
        <span class="class-teacher"></span>
      </button>
    </template>

    <template id="outfitFieldTemplate">
      <div class="outfit-field">
        <div class="outfit-field-label">
          <span class="outfit-field-name"></span>
          <input class="outfit-field-name-input" type="text" autocomplete="off" />
          <button class="remove-field-button" type="button" title="删除字段">×</button>
        </div>
        <input class="outfit-value-input" type="text" autocomplete="off" />
      </div>
    </template>

    <template id="packingItemTemplate">
      <div class="packing-item">
        <span class="item-name"></span>
        <span class="item-count"></span>
      </div>
    </template>

    <template id="tripTabTemplate">
      <button class="trip-tab" type="button">
        <strong class="trip-tab-city"></strong>
        <span class="trip-tab-dates"></span>
      </button>
    </template>
    <script>
const STORAGE_KEY = "travel-packing-planner-v3";
const LEGACY_KEYS = ["travel-packing-planner-v2", "dance-trip-closet-v1"];

      ],
    },
  ],
};

let state = loadState();
let editingFieldId = "";

const fields = {
  tripCity: document.querySelector("#tripCity"),
  tripDates: document.querySelector("#tripDates"),
  classCount: document.querySelector("#classCount"),
  packingCount: document.querySelector("#packingCount"),
  tripTabs: document.querySelector("#tripTabs"),
  classList: document.querySelector("#classList"),
  activeTitle: document.querySelector("#activeTitle"),
  classForm: document.querySelector("#classForm"),
  outfitList: document.querySelector("#outfitList"),
  packingList: document.querySelector("#packingList"),
  manualItemInput: document.querySelector("#manualItemInput"),
};

const classCardTemplate = document.querySelector("#classCardTemplate");
const outfitFieldTemplate = document.querySelector("#outfitFieldTemplate");
const packingItemTemplate = document.querySelector("#packingItemTemplate");
const tripTabTemplate = document.querySelector("#tripTabTemplate");

document.querySelector("#addClassButton").addEventListener("click", addClass);
document.querySelector("#deleteClassButton").addEventListener("click", deleteActiveClass);
document.querySelector("#addManualItemButton").addEventListener("click", addManualItem);
document.querySelector("#addCustomFieldButton").addEventListener("click", addCustomField);
fields.manualItemInput.addEventListener("keydown", (event) => {
  if (event.key === "Enter") addManualItem();
});

[fields.tripCity, fields.tripDates].forEach((input) => {
  input.addEventListener("input", () => {
    const trip = getActiveTrip();
    if (!trip) return;
    trip.city = fields.tripCity.value;
    trip.dates = fields.tripDates.value;
    saveAndRender(false);
  });
});

fields.classForm.addEventListener("input", (event) => {
  const active = getActiveClass();
  if (!active) return;

  if (event.target.dataset.outfitField) {
    active.outfit ||= {};
    active.outfit[event.target.dataset.outfitField] = event.target.value;
  } else if (event.target.dataset.outfitFieldName) {
    renameCustomField(event.target.dataset.outfitFieldName, event.target.value);
  } else if (event.target.name) {
    active[event.target.name] = event.target.value;
  }

  saveAndRender(false);
});

function loadState() {
  try {
    const stored = localStorage.getItem(STORAGE_KEY);
    if (stored) return normalizeState(JSON.parse(stored));

    for (const key of LEGACY_KEYS) {
      const legacy = localStorage.getItem(key);
      if (legacy) return normalizeState(JSON.parse(legacy));
    }
  } catch {
    return structuredClone(sampleData);
  }
  return structuredClone(sampleData);
}

function normalizeState(data) {
  const normalized = { ...structuredClone(sampleData), ...data };
  normalized.trips = Array.isArray(data.trips) && data.trips.length ? data.trips : migrateSingleTrip(data);
  normalized.trips.forEach(normalizeTrip);
  normalized.activeTripId ||= getSortedTrips(normalized.trips)[0]?.id || "";
  return normalized;
}

function migrateSingleTrip(data) {
  if (!data.trip && !data.classes) return structuredClone(sampleData.trips);
  return [
    {
      id: "trip-migrated",
      city: data.trip?.city || "",
      dates: data.trip?.dates || "",
      createdAt: Date.now(),
      activeClassId: data.activeClassId || data.classes?.[0]?.id || "",
      outfitFields: DEFAULT_OUTFIT_FIELDS,
      classes: data.classes || [],
      manualItems: (data.manualItems || []).map((item) => ({ id: item.id, name: item.name })),
    },
  ];
}

function normalizeTrip(trip) {
  trip.id ||= `trip-${Date.now()}`;
  trip.createdAt ||= Date.now();
  trip.classes ||= [];
  trip.manualItems ||= [];
  trip.outfitFields = addLegacyFieldsIfNeeded(trip);
  trip.outfitFields = normalizeOutfitFields(trip.outfitFields);
  trip.classes = trip.classes.map((classItem) => normalizeClassItem(classItem, trip.outfitFields));
  trip.activeClassId ||= trip.classes[0]?.id || "";
}

function addLegacyFieldsIfNeeded(trip) {
  const fieldsFromData = Array.isArray(trip.outfitFields) ? [...trip.outfitFields] : [];
  const legacyFields = [
    ["extras", "配饰"],
    ["backup", "备用衣物"],
    ["smallThings", "小物"],
  ];

  legacyFields.forEach(([id, label]) => {
    const hasValue = trip.classes.some((classItem) => classItem[id]);
    const alreadyExists = fieldsFromData.some((field) => field.id === id);
    if (hasValue && !alreadyExists) fieldsFromData.push({ id, label });
  });

  return fieldsFromData;
}

function normalizeOutfitFields(outfitFields) {
  const fieldsFromData = Array.isArray(outfitFields) ? outfitFields : [];
  const byId = new Map(DEFAULT_OUTFIT_FIELDS.map((field) => [field.id, { ...field }]));
  fieldsFromData.forEach((field) => {
    if (!field?.id || !field?.label) return;
    byId.set(field.id, { id: field.id, label: field.label });
  });
  return [...byId.values()];
}

function normalizeClassItem(classItem, outfitFields) {
  const migrated = { ...classItem };
  const dateTime = splitDateTime(migrated.time);
  migrated.date ||= dateTime.date;
  migrated.time = dateTime.time || migrated.time || "";
  migrated.teacher ||= extractTeacher(migrated.studio);
  migrated.outfit ||= {};

  const legacyMap = {
    top: migrated.top,
    bottom: migrated.bottom,
    shoes: migrated.shoes,
    extras: migrated.extras,
    backup: migrated.backup,
    smallThings: migrated.smallThings,
  };
  Object.entries(legacyMap).forEach(([key, value]) => {
    if (!migrated.outfit[key] && value) migrated.outfit[key] = value;
  });

  outfitFields.forEach((field) => {
    migrated.outfit[field.id] ||= "";
  });

  return migrated;
}

function splitDateTime(value) {
  const text = String(value || "").trim();
  const match = text.match(/^(.*?)(\d{1,2}:\d{2})$/);
  if (!match) return { date: "", time: text };
  return { date: match[1].trim(), time: match[2].trim() };
}

function extractTeacher(value) {
  const text = String(value || "").trim();
  if (!text) return "";
  const parts = text.split("/");
  return parts[1]?.trim() || text;
}

function saveAndRender(shouldRender = true) {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
  if (shouldRender) render();
  if (!shouldRender) {
    const active = getActiveClass();
    fields.activeTitle.textContent = active?.className || "";
    renderTripTabs();
    renderClassList();
    renderPacking();
    renderSummary();
  }
}

function render() {
  const trip = getActiveTrip();
  if (!trip) return;
  fields.tripCity.value = trip.city;
  fields.tripDates.value = trip.dates;
  renderTripTabs();
  renderClassList();
  renderActiveClass();
  renderPacking();
  renderSummary();
}

function renderSummary() {
  const trip = getActiveTrip();
  const packing = buildPackingItems();
  fields.classCount.textContent = String(trip?.classes.length || 0);
  fields.packingCount.textContent = String(packing.length);
}

function renderTripTabs() {
  fields.tripTabs.replaceChildren();
  getSortedTrips().forEach((trip) => {
    const node = tripTabTemplate.content.firstElementChild.cloneNode(true);
    node.classList.toggle("is-active", trip.id === state.activeTripId);
    node.querySelector(".trip-tab-city").textContent = trip.city || "—";
    node.querySelector(".trip-tab-dates").textContent = trip.dates || "";
    node.addEventListener("click", () => {
      state.activeTripId = trip.id;
      saveAndRender();
    });
    fields.tripTabs.append(node);
  });

  const addButton = document.createElement("button");
  addButton.className = "trip-tab add-trip";
  addButton.type = "button";
  addButton.textContent = "+ 新旅行";
  addButton.addEventListener("click", addTrip);
  fields.tripTabs.append(addButton);
}

function renderClassList() {
  const trip = getActiveTrip();
  fields.classList.replaceChildren();
  if (!trip?.classes.length) {
    return;
  }

  trip.classes.forEach((classItem) => {
    const node = classCardTemplate.content.firstElementChild.cloneNode(true);
    node.classList.toggle("is-active", classItem.id === trip.activeClassId);
    node.querySelector(".class-name").textContent = classItem.className || "—";
    node.querySelector(".class-date").textContent = classItem.date || "";
    node.querySelector(".class-time").textContent = classItem.time || "";
    node.querySelector(".class-teacher").textContent = classItem.teacher ? `老师：${classItem.teacher}` : "";
    node.addEventListener("click", () => {
      trip.activeClassId = classItem.id;
      saveAndRender();
    });
    fields.classList.append(node);
  });
}

function renderActiveClass() {
  const active = getActiveClass();
  fields.classForm.toggleAttribute("hidden", !active);
  document.querySelector("#deleteClassButton").disabled = !active;
  fields.outfitList.replaceChildren();
  if (!active) {
    fields.activeTitle.textContent = "";
    return;
  }

  fields.activeTitle.textContent = active.className || "";
  [...fields.classForm.elements].forEach((input) => {
    if (!input.name) return;
    input.value = active[input.name] || "";
  });
  renderOutfitFields(active);
}

function renderOutfitFields(active) {
  const trip = getActiveTrip();
  trip.outfitFields.forEach((field) => {
    const node = outfitFieldTemplate.content.firstElementChild.cloneNode(true);
    const input = node.querySelector(".outfit-value-input");
    const labelText = node.querySelector(".outfit-field-name");
    const labelInput = node.querySelector(".outfit-field-name-input");
    const removeButton = node.querySelector(".remove-field-button");
    const custom = isCustomField(field.id);
    node.classList.toggle("is-custom", custom);
    labelText.textContent = field.label || "—";
    labelInput.value = field.label;
    labelInput.dataset.outfitFieldName = field.id;
    const editing = custom && field.id === editingFieldId;
    labelText.hidden = editing;
    labelInput.hidden = !editing;
    input.dataset.outfitField = field.id;
    input.value = active.outfit?.[field.id] || "";
    labelText.addEventListener("dblclick", () => editCustomFieldName(field.id));
    labelInput.addEventListener("blur", () => finishCustomFieldNameEdit(field.id));
    labelInput.addEventListener("keydown", (event) => {
      if (event.key === "Enter") {
        event.preventDefault();
        finishCustomFieldNameEdit(field.id);
      }
    });
    removeButton.addEventListener("click", () => removeCustomField(field.id));
    fields.outfitList.append(node);
  });
}

function renderPacking() {
  const items = buildPackingItems();
  fields.packingList.replaceChildren();
  if (!items.length) {
    return;
  }

  const groups = groupBy(items, "group");
  Object.entries(groups).forEach(([groupName, groupItems]) => {
    const group = document.createElement("section");
    group.className = "packing-group";
    const title = document.createElement("h3");
    title.textContent = groupName;
    group.append(title);

    groupItems.forEach((item) => {
      const node = packingItemTemplate.content.firstElementChild.cloneNode(true);
      node.querySelector(".item-name").textContent = item.name;
      node.querySelector(".item-count").textContent = item.count > 1 ? `x${item.count}` : "";
      group.append(node);
    });
    fields.packingList.append(group);
  });
}

function buildPackingItems() {
  const trip = getActiveTrip();
  if (!trip) return [];

  const map = new Map();
  trip.classes.forEach((classItem) => {
    trip.outfitFields.forEach((field) => {
      const groupName = field.label.trim();
      if (!groupName) return;
      splitItems(classItem.outfit?.[field.id]).forEach((name) => {
        const itemKey = `${groupName}:${name}`;
        const existing = map.get(itemKey);
        if (existing) {
          existing.count += 1;
        } else {
          map.set(itemKey, { key: itemKey, group: groupName, name, count: 1 });
        }
      });
    });
  });

  trip.manualItems.forEach((item) => {
    const key = `额外:${item.name}`;
    map.set(key, { key, group: "额外", name: item.name, count: 1 });
  });

  return [...map.values()];
}

function splitItems(value) {
  return String(value || "")
    .split(/[,，、/]/)
    .map((item) => item.trim())
    .filter(Boolean);
}

function groupBy(items, key) {
  return items.reduce((acc, item) => {
    acc[item[key]] ||= [];
    acc[item[key]].push(item);
    return acc;
  }, {});
}

function getActiveTrip() {
  return state.trips.find((trip) => trip.id === state.activeTripId) || getSortedTrips()[0];
}

function getActiveClass() {
  const trip = getActiveTrip();
  return trip?.classes.find((item) => item.id === trip.activeClassId) || trip?.classes[0];
}

function getSortedTrips(trips = state.trips) {
  return [...trips].sort((a, b) => getTripRank(b) - getTripRank(a));
}

function getTripRank(trip) {
  return extractDateRank(trip.dates) || trip.createdAt || 0;
}

function extractDateRank(value) {
  const text = String(value || "");
  const iso = text.match(/20\d{2}[-/.]\d{1,2}[-/.]\d{1,2}/);
  if (iso) return new Date(iso[0].replace(/[/.]/g, "-")).getTime();

  const chinese = text.match(/(\d{1,2})\s*月\s*(\d{1,2})\s*日?/);
  if (chinese) {
    const month = Number(chinese[1]) - 1;
    const day = Number(chinese[2]);
    return new Date(new Date().getFullYear(), month, day).getTime();
  }
  return 0;
}

function addTrip() {
  const id = `trip-${Date.now()}`;
  const trip = {
    id,
    city: "",
    dates: "",
    createdAt: Date.now(),
    activeClassId: "",
    outfitFields: structuredClone(DEFAULT_OUTFIT_FIELDS),
    classes: [],
    manualItems: [],
  };
  state.trips.push(trip);
  state.activeTripId = id;
  saveAndRender();
}

function addClass() {
  const trip = getActiveTrip();
  if (!trip) return;
  const id = `class-${Date.now()}`;
  const outfit = {};
  trip.outfitFields.forEach((field) => {
    outfit[field.id] = "";
  });
  trip.classes.push({
    id,
    date: "",
    time: "",
    className: "",
    teacher: "",
    outfit,
  });
  trip.activeClassId = id;
  saveAndRender();
}

function deleteActiveClass() {
  const trip = getActiveTrip();
  const active = getActiveClass();
  if (!trip || !active) return;
  trip.classes = trip.classes.filter((item) => item.id !== active.id);
  trip.activeClassId = trip.classes[0]?.id || "";
  saveAndRender();
}

function addCustomField() {
  const trip = getActiveTrip();
  if (!trip) return;
  const id = `custom-${Date.now()}`;
  trip.outfitFields.push({ id, label: "" });
  trip.classes.forEach((classItem) => {
    classItem.outfit ||= {};
    classItem.outfit[id] = "";
  });
  editingFieldId = id;
  saveAndRender();
  window.requestAnimationFrame(() => {
    const input = fields.outfitList.querySelector(`[data-outfit-field-name="${id}"]`);
    input?.focus();
  });
}

function renameCustomField(id, label) {
  const trip = getActiveTrip();
  if (!trip || !isCustomField(id)) return;
  const field = trip.outfitFields.find((item) => item.id === id);
  if (!field) return;
  field.label = label;
  saveAndRender(false);
}

function editCustomFieldName(id) {
  if (!isCustomField(id)) return;
  editingFieldId = id;
  renderActiveClass();
  window.requestAnimationFrame(() => {
    const input = fields.outfitList.querySelector(`[data-outfit-field-name="${id}"]`);
    input?.focus();
    input?.select();
  });
}

function finishCustomFieldNameEdit(id) {
  if (editingFieldId !== id) return;
  editingFieldId = "";
  renderActiveClass();
}

function removeCustomField(id) {
  const trip = getActiveTrip();
  if (!trip || !isCustomField(id)) return;
  if (editingFieldId === id) editingFieldId = "";
  trip.outfitFields = trip.outfitFields.filter((field) => field.id !== id);
  trip.classes.forEach((classItem) => {
    if (classItem.outfit) delete classItem.outfit[id];
  });
  saveAndRender();
}

function isCustomField(id) {
  return !DEFAULT_OUTFIT_FIELDS.some((field) => field.id === id);
}

function addManualItem() {
  const trip = getActiveTrip();
  const name = fields.manualItemInput.value.trim();
  if (!trip || !name) return;
  trip.manualItems.push({ id: `manual-${Date.now()}`, name });
  fields.manualItemInput.value = "";
  saveAndRender();
}

function emptyState(text) {
  const node = document.createElement("p");
  node.className = "empty-state";
  node.textContent = text;
  return node;
}

function showToast(text) {
  const toast = document.createElement("div");
  toast.className = "toast";
  toast.textContent = text;
  document.body.append(toast);
  window.setTimeout(() => toast.remove(), 1800);
}

render();

    </script>
  </body>
</html>
